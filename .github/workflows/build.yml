name: Build Mihomo.apk

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  OPENWRT_VERSION: 25.12.2
  TARGET_URL: https://downloads.openwrt.org/releases/25.12.2/targets/mediatek/filogic/
  TARGET_NAME: mt7981_filogic

jobs:
  build:
    name: Build mt7981-filogic
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v6

      - name: Get latest mihomo version
        run: |
          TAG=$(curl -s "https://api.github.com/repos/MetaCubeX/mihomo/tags" | jq -r '.[0].name' | tr -d 'v')
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Check if build already exists
        id: check_existing
        run: |
          if gh release view "v${{ env.TAG }}" --json assets --jq '.assets[].name' 2>/dev/null | grep -q "${{ env.TARGET_NAME }}"; then
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
            echo "Skipping build - release v${{ env.TAG }} already contains APK for ${{ env.TARGET_NAME }}"
          else
            echo "SKIP_BUILD=false" >> $GITHUB_ENV
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install deps
        if: env.SKIP_BUILD != 'true'
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget jq zstd

      - name: Generate build keys
        if: env.SKIP_BUILD != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y signify-openbsd
          signify-openbsd -G -n -c 'DO NOT USE - OpenWrt packages feed CI' -p packages_ci.pub -s packages_ci.sec
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "KEY_BUILD<<$EOF" >> $GITHUB_ENV
          cat packages_ci.sec >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Setup latest golang release
        if: env.SKIP_BUILD != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Show go version
        if: env.SKIP_BUILD != 'true'
        run: |
          go version

      - name: Build
        if: env.SKIP_BUILD != 'true'
        run: |
          set -e

          SDK=$(curl -s -L "${{ env.TARGET_URL }}sha256sums" | grep sdk | sed 's/.* \*//')
          echo "SDK=$SDK"

          wget "${{ env.TARGET_URL }}${SDK}" -O sdk.tar.xz

          mkdir sdk
          tar -I zstd -xf sdk.tar.xz --strip-components=1 -C sdk
          cd sdk

          ./scripts/feeds update -a

          wget "${{ env.TARGET_URL }}config.buildinfo" -O .config
          make defconfig

          cp -a ../net package/

          sed -i 's/PKG_VERSION:=stable/PKG_VERSION:=${{ env.TAG }}/g' package/net/mihomo/Makefile
          cat package/net/mihomo/Makefile

          make package/net/mihomo/{download,check} FIXUP=1 V=s
          cat package/net/mihomo/Makefile

          make package/net/mihomo/compile V=s

          find bin/packages -name '*.apk' -exec sh -c 'mv "$1" "${1%.apk}_${{ env.TARGET_NAME }}.apk"' _ {} \;

          FN=$(find bin/packages -name 'mihomo*.apk' | sort | head -1 | xargs basename)
          echo "PKG_NAME=$FN" >> $GITHUB_ENV

          cd -

      - name: Publishing to GitHub Artifacts
        if: env.SKIP_BUILD != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PKG_NAME }}
          path: |
            sdk/bin/packages/*/*/mihomo*.apk

      - name: Read README.md and use it as release body
        if: env.SKIP_BUILD != 'true'
        id: read_release
        shell: bash
        run: |
          r=$(cat README.md)
          r="${r//'%'/'%25'}"
          r="${r//$'\n'/'%0A'}"
          r="${r//$'\r'/'%0D'}"
          echo "RELEASE_BODY=$r" >> $GITHUB_OUTPUT

      - name: Publishing to GitHub Releases
        if: env.SKIP_BUILD != 'true'
        continue-on-error: true
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: sdk/bin/packages/*/*/mihomo*.apk
          tag: v${{ env.TAG }}
          release_name: v${{ env.TAG }}
          file_glob: true
          overwrite: true
          body: |
            ${{ steps.read_release.outputs.RELEASE_BODY }}

  cleanup:
    name: Keep only 2 latest releases
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Delete old releases
        run: |
          gh release list --limit 100 | awk 'NR > 2 {print $3}' | xargs -r -I % gh release delete % --yes --cleanup-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
